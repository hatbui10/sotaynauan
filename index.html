<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sổ Tay Nấu Ăn V28 - Ultimate Grid</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-green: #00ff41;
            --bg-deep: #050505;
        }

        body { background-color: var(--bg-deep); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; }
        
        /* SECURITY BAR */
        .security-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .lock-btn { background: transparent; border: 1px solid orange; color: orange; padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .unlocked-state { border-color: var(--neon-green); color: var(--neon-green); font-weight: bold; }

        h2 { text-align: center; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }
        
        /* GRID SYSTEM */
        .recipe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .grid-item { aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,242,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 8px; font-size: 10px; color: var(--neon-green); cursor: pointer; text-transform: uppercase; font-weight: bold; overflow: hidden; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .modal-content { background: #111; border: 1px solid var(--neon-blue); border-radius: 15px; padding: 20px; max-width: 500px; margin: auto; position: relative; }

        /* TABLE COLUMNS */
        .recipe-table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 10px 0; table-layout: fixed; }
        .recipe-table th, .recipe-table td { border: 1px solid #333; padding: 6px; text-align: left; }
        .col-idx { width: 35px; text-align: center !important; }
        .col-name { width: 40%; }
        .col-val { width: 15%; text-align: center !important; }
        .col-unit { width: 15%; text-align: center !important; }
        .col-status { width: 20%; }
        
        .edit-input { background: transparent; border: none; color: #fff; width: 100%; font-size: 11px; outline: none; }
        .in-n { color: var(--neon-green); }

        /* BUTTONS */
        .btn-main { width: 100%; padding: 15px; background: none; border: 2px dashed var(--neon-blue); color: var(--neon-blue); border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-save { width: 100%; background: var(--neon-green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-del { background: #ff4444 !important; color: #fff !important; }
        .btn-export { background: var(--neon-pink); color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }

        textarea { width: 100%; background: #000; border: 1px solid #333; color: #ccc; border-radius: 5px; padding: 8px; margin-top: 10px; box-sizing: border-box; font-size: 12px; }
        .del-row-btn { background: #ff4444; color: white; border: none; padding: 2px 5px; border-radius: 3px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="security-bar">
        <button class="lock-btn" id="btnLock" onclick="toggleSecurity()">🔓 Mở khóa sửa</button>
        <button class="lock-btn" style="border-color:var(--neon-pink); color:var(--neon-pink)" onclick="exportTxt()">📥 Xuất TXT</button>
    </div>

    <h2>KITCHEN GRID V28</h2>
    <button class="btn-main" onclick="openAddModal()">+ THÊM MÓN ĂN MỚI</button>
    <div class="recipe-grid" id="recipeGrid"></div>
</div>

<!-- MODAL CHI TIẾT & SỬA -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <button onclick="closeModal('detailModal')" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#fff; font-size:20px;">✕</button>
        <div id="detailBody"></div>
        
        <div id="editActions" style="display:none">
            <button class="btn-save" style="background:none; border:1px solid var(--neon-blue); color:var(--neon-blue)" onclick="addRowEd()">+ THÊM HÀNG</button>
            <button class="btn-save" onclick="saveEdit()">💾 LƯU THAY ĐỔI</button>
            <button class="btn-save btn-del" onclick="deleteRecipe()">🗑️ XOÁ MÓN ĂN</button>
        </div>
        
        <button id="btnEnterEdit" class="btn-save" style="background:#ffcc00; display:none" onclick="enableEditMode()">✏️ CHẾ ĐỘ SỬA</button>
    </div>
</div>

<script>
    let recipes = JSON.parse(localStorage.getItem('cook_grid_v21')) || [];
    let isUnlocked = false;
    let currentIdx = null;

    // Khôi phục data list cũ nếu có
    window.onload = () => {
        const oldData = localStorage.getItem('cook_html_v17');
        if (oldData && recipes.length === 0) {
            const div = document.createElement('div'); div.innerHTML = oldData;
            div.querySelectorAll('.recipe-entry').forEach(entry => {
                const name = entry.querySelector('strong')?.innerText.replace('🥘 MÓN: ', '') || "Không tên";
                const ings = [];
                entry.querySelectorAll('tbody tr').forEach(tr => {
                    const td = tr.querySelectorAll('td');
                    if(td.length >= 5) ings.push({ n: td[1].innerText, a: td[2].innerText, u: td[3].innerText, s: td[4].innerText });
                });
                recipes.push({ name, ings, steps: entry.querySelector('.editable-text')?.innerText || "" });
            });
            localStorage.setItem('cook_grid_v21', JSON.stringify(recipes));
        }
        renderGrid();
    };

    function renderGrid() {
        const grid = document.getElementById('recipeGrid');
        grid.innerHTML = '';
        recipes.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerText = r.name;
            div.onclick = () => showDetail(i);
            grid.appendChild(div);
        });
    }

    function showDetail(i) {
        currentIdx = i; const r = recipes[i];
        let rows = r.ings.map((ing, idx) => `
            <tr class="ing-row">
                <td class="col-idx"><button class="del-row-btn" onclick="this.parentElement.parentElement.remove()">✕</button><span class="row-num">${idx+1}</span></td>
                <td class="col-name"><input type="text" class="edit-input in-n" value="${ing.n}" readonly></td>
                <td class="col-val"><input type="text" class="edit-input in-a" value="${ing.a}" readonly></td>
                <td class="col-unit"><input type="text" class="edit-input in-u" value="${ing.u}" readonly></td>
                <td class="col-status"><input type="text" class="edit-input in-s" value="${ing.s}" readonly></td>
            </tr>`).join('');

        document.getElementById('detailBody').innerHTML = `
            <input type="text" id="edName" value="${r.name}" style="background:transparent; border:none; color:var(--neon-blue); font-size:18px; font-weight:bold; width:100%; text-align:center; margin-bottom:10px" readonly>
            <table class="recipe-table">
                <thead><tr style="color:var(--neon-pink)"><th>#</th><th>Tên</th><th>SL</th><th>ĐV</th><th>TT</th></tr></thead>
                <tbody id="edTableBody">${rows}</tbody>
            </table>
            <textarea id="edSteps" rows="5" readonly>${r.steps}</textarea>
        `;
        
        document.getElementById('detailModal').style.display = 'block';
        document.getElementById('editActions').style.display = 'none';
        updateUI();
    }

    function openAddModal() {
        recipes.unshift({ name: "MÓN MỚI", ings: [{n:"", a:"", u:"", s:""}], steps: "" });
        showDetail(0);
        enableEditMode();
    }

    function enableEditMode() {
        document.querySelectorAll('.edit-input, #edSteps, #edName').forEach(el => {
            el.readOnly = false;
            if(el.classList.contains('edit-input')) el.style.borderBottom = "1px solid #333";
        });
        document.querySelectorAll('.del-row-btn').forEach(el => el.style.display = 'block');
        document.querySelectorAll('.row-num').forEach(el => el.style.display = 'none');
        document.getElementById('editActions').style.display = 'block';
        document.getElementById('btnEnterEdit').style.display = 'none';
    }

    function addRowEd() {
        const tr = document.createElement('tr'); tr.className = 'ing-row';
        tr.innerHTML = `<td class="col-idx"><button class="del-row-btn" style="display:block" onclick="this.parentElement.parentElement.remove()">✕</button></td><td><input type="text" class="edit-input in-n"></td><td><input type="text" class="edit-input in-a"></td><td><input type="text" class="edit-input in-u"></td><td><input type="text" class="edit-input in-s"></td>`;
        document.getElementById('edTableBody').appendChild(tr);
    }

    function saveEdit() {
        const newIngs = [];
        document.querySelectorAll('.ing-row').forEach(row => {
            const n = row.querySelector('.in-n').value;
            if(n) newIngs.push({ n, a: row.querySelector('.in-a').value, u: row.querySelector('.in-u').value, s: row.querySelector('.in-s').value });
        });
        recipes[currentIdx] = { name: document.getElementById('edName').value, ings: newIngs, steps: document.getElementById('edSteps').value };
        localStorage.setItem('cook_grid_v21', JSON.stringify(recipes));
        renderGrid(); closeModal('detailModal');
    }

    function deleteRecipe() {
        if(confirm("Xoá món này vĩnh viễn?")) {
            recipes.splice(currentIdx, 1);
            localStorage.setItem('cook_grid_v21', JSON.stringify(recipes));
            renderGrid(); closeModal('detailModal');
        }
    }

    function toggleSecurity() {
        if(!isUnlocked) { if(prompt("Pass:") === "4321") isUnlocked = true; } 
        else isUnlocked = false;
        updateUI();
    }

    function updateUI() {
        const btn = document.getElementById('btnLock');
        btn.innerText = isUnlocked ? "🔒 Đang mở" : "🔓 Mở khóa sửa";
        btn.classList.toggle('unlocked-state', isUnlocked);
        if(isUnlocked && document.getElementById('btnEnterEdit')) document.getElementById('btnEnterEdit').style.display = 'block';
    }

    function exportTxt() {
        let txt = "SỔ TAY NẤU ĂN\n\n";
        recipes.forEach(r => {
            txt += `🥘 MÓN: ${r.name.toUpperCase()}\n`;
            r.ings.forEach(i => txt += `- ${i.n}: ${i.a} ${i.u} (${i.s})\n`);
            txt += `📝 CÁCH LÀM: ${r.steps}\n\n------------------\n\n`;
        });
        const blob = new Blob(["\ufeff", txt], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'SoTayNauAn.txt'; a.click();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
