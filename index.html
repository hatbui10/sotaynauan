<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sổ Tay Công Thức Pro Max</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-green: #00ff41;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px 10px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);
        }

        h2 {
            text-align: center;
            color: var(--neon-blue);
            font-size: 20px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .section-title {
            font-size: 12px;
            color: var(--neon-pink);
            margin-bottom: 12px;
            border-left: 3px solid var(--neon-pink);
            padding-left: 8px;
            text-transform: uppercase;
            font-weight: bold;
            display: block;
        }

        .spacer-30 {
            margin-top: 30px;
        }

        .x1-main-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 10px;
            padding: 15px;
        }

        .x2i-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
        }

        label {
            display: block;
            font-size: 10px;
            color: var(--neon-blue);
            margin-bottom: 4px;
            font-weight: bold;
        }

        input, select, textarea {
            background: #000;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
        }

        .btn-add-x2i {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .btn-remove-x2i {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.8fr;
            gap: 8px;
            margin-top: 20px;
        }

        .main-btn {
            height: 48px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        .btn-create { background: var(--neon-blue); color: #000; }
        .btn-export { background: var(--neon-pink); color: #fff; }
        .btn-reset { background: #333; color: #fff; }

        #resultArea {
            height: 280px;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 20px;
            border: 1px solid #444;
            line-height: 1.5;
        }

        .flex-group { display: flex; gap: 8px; }
        
        .clear-all {
            width: 100%;
            margin-top: 15px;
            background: #1a1a1a;
            color: #666;
            height: 35px;
            font-size: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>👨‍🍳 Sổ tay nấu ăn</h2>

        <div class="x1-main-box">
            <span class="section-title">X1: Thông tin món ăn</span>
            <label>Tên món ăn / Nhóm</label>
            <input type="text" id="recipeName" placeholder="Tên món ăn..." autocomplete="off">

            <div style="margin-top: 20px;">
                <span class="section-title">Thành phần chi tiết (X2i)</span>
                <div id="x2i-list"></div>
                <button class="btn-add-x2i" onclick="addX2i()">+ THÊM NGUYÊN LIỆU</button>
            </div>
        </div>

        <div class="spacer-30">
            <span class="section-title">X2: Cách chế biến</span>
            <textarea id="cookingSteps" style="height: 140px;" placeholder="Ấn Enter để nhảy số..."></textarea>
        </div>

        <div class="spacer-30">
            <span class="section-title">X3: Lưu ý & Mẹo nhỏ</span>
            <textarea id="notes" style="height: 100px;" placeholder="Ấn Enter để nhảy số..."></textarea>
        </div>

        <div class="btn-grid">
            <button class="main-btn btn-create" onclick="saveRecipe()">Lưu Sổ</button>
            <button class="main-btn btn-export" onclick="exportTxt()">Xuất TXT</button>
            <button class="main-btn btn-reset" onclick="resetForm()">Reset</button>
        </div>

        <textarea id="resultArea" placeholder="Dữ liệu tổng hợp..."></textarea>
        
        <button class="clear-all" onclick="clearStorage()">XÓA SẠCH BỘ NHỚ LƯU TRỮ</button>
    </div>

    <script>
        const x2iList = document.getElementById('x2i-list');
        const area = document.getElementById('resultArea');
        const stepsArea = document.getElementById('cookingSteps');
        const notesArea = document.getElementById('notes');

        window.onload = () => {
            const saved = localStorage.getItem('cook_pro_v5');
            if (saved) area.value = saved;
            addX2i();
            if (!stepsArea.value) stepsArea.value = "1. ";
            if (!notesArea.value) notesArea.value = "1. ";
        };

        function addX2i() {
            const div = document.createElement('div');
            div.className = 'x2i-box';
            div.innerHTML = `
                <button class="btn-remove-x2i" onclick="this.parentElement.remove()">✕</button>
                <div style="margin-bottom: 8px;">
                    <label>Tên thành phần</label>
                    <input type="text" class="in-ing" placeholder="Tên nguyên liệu...">
                </div>
                <div class="flex-group">
                    <div style="flex:1.2">
                        <label>Số lượng</label>
                        <input type="text" class="in-amt" placeholder="VD: 500">
                    </div>
                    <div style="flex:2">
                        <label>Đơn vị</label>
                        <select class="in-unit">
                            <option value="g">g (Gram)</option>
                            <option value="kg">kg</option>
                            <option value="ml">ml</option>
                            <option value="Lít">Lít</option>
                            <option value="muỗng cafe">Muỗng cafe</option>
                            <option value="muỗng canh">Muỗng canh</option>
                            <option value="thìa">Thìa</option>
                            <option value="bát">Bát/Chén</option>
                            <option value="quả">Quả/Trái</option>
                            <option value="củ">Củ</option>
                            <option value="nhánh">Nhánh</option>
                            <option value="lát">Lát</option>
                            <option value="gói">Gói</option>
                            <option value="hộp">Hộp</option>
                        </select>
                    </div>
                </div>
            `;
            x2iList.appendChild(div);
        }

        // Hàm xử lý tự động nhảy số chung cho nhiều textarea
        function setupAutoNumber(element) {
            element.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const lines = element.value.split('\n');
                    const lastLine = lines[lines.length - 1];
                    const match = lastLine.match(/^(\d+)\./);
                    let nextNum = match ? parseInt(match[1]) + 1 : 1;
                    element.value += "\n" + nextNum + ". ";
                    element.scrollTop = element.scrollHeight;
                }
            });
        }

        // Áp dụng cho cả X2 và X3
        setupAutoNumber(stepsArea);
        setupAutoNumber(notesArea);

        area.addEventListener('input', () => {
            localStorage.setItem('cook_pro_v5', area.value);
        });

        function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) return alert("Vui lòng nhập tên món ăn!");

            let content = `🥘 MÓN: ${name.toUpperCase()}\n`;
            content += `📍 THÀNH PHẦN:\n`;
            
            const items = document.querySelectorAll('.x2i-box');
            let hasData = false;
            items.forEach((item, index) => {
                const ing = item.querySelector('.in-ing').value.trim();
                const amt = item.querySelector('.in-amt').value.trim();
                const unit = item.querySelector('.in-unit').value;
                if(ing) {
                    content += `   ${index + 1}. ${ing}: ${amt} ${unit}\n`;
                    hasData = true;
                }
            });

            if(!hasData) return alert("Cần nhập nguyên liệu!");

            content += `📝 CHẾ BIẾN:\n   ${stepsArea.value.replace(/\n/g, '\n   ')}\n`;
            content += `💡 LƯU Ý:\n   ${notesArea.value.replace(/\n/g, '\n   ')}\n`;
            content += `----------------------------------------\n\n`;

            area.value += content;
            localStorage.setItem('cook_pro_v5', area.value);
            area.scrollTop = area.scrollHeight;
            resetForm();
        }

        function resetForm() {
            document.getElementById('recipeName').value = '';
            x2iList.innerHTML = '';
            addX2i();
            stepsArea.value = "1. ";
            notesArea.value = "1. ";
        }

        function exportTxt() {
            if (!area.value) return alert("Trống!");
            const blob = new Blob([area.value], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `CookBook_${new Date().getTime()}.txt`;
            a.click();
        }

        function clearStorage() {
            if (confirm("Xóa vĩnh viễn dữ liệu đã lưu?")) {
                localStorage.removeItem('cook_pro_v5');
                area.value = '';
            }
        }
    </script>
</body>
</html>
