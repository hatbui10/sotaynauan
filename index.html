<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sổ Tay Nấu Ăn V17 - Pro Edit</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-green: #00ff41;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 15px 10px; padding-bottom: 40px;
        }

        .container {
            max-width: 500px; margin: auto;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px; padding: 12px;
        }

        h2 { text-align: center; color: var(--neon-blue); text-transform: uppercase; margin: 10px 0; font-size: 18px; }

        .section-title {
            font-size: 11px; color: var(--neon-pink); margin: 20px 0 10px 0;
            border-left: 3px solid var(--neon-pink); padding-left: 8px;
            text-transform: uppercase; font-weight: bold; display: block;
        }

        .x1-main-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-radius: 10px; padding: 12px;
        }

        .x2i-box {
            background: rgba(0, 0, 0, 0.6); border: 1px solid #333; 
            border-radius: 8px; padding: 10px; margin-bottom: 12px; position: relative;
        }

        input, textarea {
            background: #000; border: 1px solid #444; border-radius: 6px;
            color: #fff; padding: 10px; font-size: 15px; outline: none; width: 100%; box-sizing: border-box;
        }

        .btn-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 8px; margin: 20px 0; }
        .main-btn { height: 45px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-create { background: var(--neon-blue); color: #000; }
        .btn-export { background: var(--neon-pink); color: #fff; }
        .btn-reset { background: #333; color: #fff; }

        /* BẢNG KẾT QUẢ */
        #htmlPreview { margin-top: 15px; padding: 8px; border-radius: 8px; background: #000; border: 1px solid rgba(0, 255, 65, 0.2); }
        
        .recipe-entry { position: relative; }
        
        /* Nút xóa món ăn */
        .del-recipe-btn {
            position: absolute; right: 0; top: 0; background: #ff4444; color: white;
            border: none; border-radius: 4px; padding: 2px 8px; font-size: 10px;
            cursor: pointer; display: none; z-index: 10;
        }
        .unlocked .del-recipe-btn { display: block; }

        .recipe-table {
            width: 100%; border-collapse: collapse; font-size: 11px;
            margin: 10px 0; color: var(--neon-green); table-layout: fixed;
        }

        .recipe-table th, .recipe-table td {
            border: 1px solid #333; padding: 6px; word-wrap: break-word; outline: none; text-align: left;
        }

        .recipe-table th { background: rgba(0, 242, 255, 0.1); color: var(--neon-blue); }
        .unlocked td:focus { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--neon-green); }

        .flex-group { display: flex; gap: 6px; margin-top: 8px; }
        .editable-text { white-space: pre-wrap; outline: none; padding: 5px; border-radius: 4px; margin-top: 5px; }

        .lock-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .lock-btn {
            background: transparent; border: 1px solid orange; color: orange;
            padding: 5px 12px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }
        .unlocked-state { border-color: var(--neon-green); color: var(--neon-green); }

        /* HD Sửa hàng */
        .edit-hint { font-size: 9px; color: #666; margin-top: 5px; display: none; }
        .unlocked .edit-hint { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h2>👨‍🍳 KITCHEN DIARY V17</h2>

        <datalist id="unit-suggestions">
            <option value="gam"> <option value="ml"> <option value="miếng"> <option value="chiếc">
            <option value="thìa canh"> <option value="thìa cafe"> <option value="bát"> <option value="quả">
        </datalist>

        <div class="x1-main-box">
            <span class="section-title">X1: Tên món ăn</span>
            <input type="text" id="recipeName" placeholder="Tên món...">

            <div style="margin-top: 20px;">
                <span class="section-title">Thành phần</span>
                <div id="x2i-list"></div>
                <button onclick="addX2i()" style="background:transparent; color:var(--neon-green); border:1px dashed var(--neon-green); width:100%; padding:10px; border-radius:6px; cursor:pointer">+ THÊM NGUYÊN LIỆU</button>
            </div>
        </div>

        <div style="margin-top:20px">
            <span class="section-title">X2: Cách chế biến</span>
            <textarea id="cookingSteps" style="height:100px" placeholder="1. Bước 1..."></textarea>
        </div>

        <div style="margin-top:20px">
            <span class="section-title">X3: Lưu ý</span>
            <textarea id="notes" style="height:80px" placeholder="1. Lưu ý..."></textarea>
        </div>

        <div class="btn-grid">
            <button class="main-btn btn-create" onclick="saveRecipe()">Lưu Sổ</button>
            <button class="main-btn btn-export" onclick="exportTxt()">Xuất TXT</button>
            <button class="main-btn btn-reset" onclick="resetForm()">Reset</button>
        </div>

        <div class="lock-container">
            <span class="section-title">Dữ liệu đã lưu</span>
            <button class="lock-btn" id="btnToggleLock" onclick="toggleSecurity()">🔓 Mở khóa sửa</button>
        </div>
        <p class="edit-hint">* Mẹo: Mở khóa -> Chuột phải vào ô để Thêm/Xóa hàng. Bấm X để xóa món.</p>
        
        <div id="htmlPreview"></div>
    </div>

    <script>
        const PASS_CODE = "4321"; 
        let isUnlocked = false;

        const x2iList = document.getElementById('x2i-list');
        const preview = document.getElementById('htmlPreview');

        window.onload = () => {
            const savedHtml = localStorage.getItem('cook_html_v17');
            if (savedHtml) preview.innerHTML = savedHtml;
            addX2i();
            document.getElementById('cookingSteps').value = "1. ";
            document.getElementById('notes').value = "1. ";
            applyLockStatus();
        };

        function toggleSecurity() {
            if (!isUnlocked) {
                let input = prompt("Nhập mật khẩu để chỉnh sửa:");
                if (input === PASS_CODE) {
                    isUnlocked = true;
                    applyLockStatus();
                } else { alert("Sai mật khẩu!"); }
            } else {
                isUnlocked = false;
                applyLockStatus();
                localStorage.setItem('cook_html_v17', preview.innerHTML);
                alert("Đã khóa và lưu!");
            }
        }

        function applyLockStatus() {
            const btn = document.getElementById('btnToggleLock');
            const editables = preview.querySelectorAll('[contenteditable]');
            if (isUnlocked) {
                btn.innerText = "🔒 Khóa & Lưu";
                btn.classList.add('unlocked-state');
                preview.classList.add('unlocked');
                editables.forEach(el => el.contentEditable = "true");
            } else {
                btn.innerText = "🔓 Mở khóa sửa";
                btn.classList.remove('unlocked-state');
                preview.classList.remove('unlocked');
                editables.forEach(el => el.contentEditable = "false");
            }
        }

        function addX2i() {
            const div = document.createElement('div');
            div.className = 'x2i-box';
            div.innerHTML = `<button onclick="this.parentElement.remove()" style="position:absolute; right:5px; top:5px; background:#ff4444; border:none; color:white; border-radius:50%; width:20px; height:20px; cursor:pointer">✕</button>
                <input type="text" class="in-ing" placeholder="Tên...">
                <div class="flex-group"><input type="text" class="in-amt" placeholder="SL" style="flex:1"><input type="text" class="in-unit" list="unit-suggestions" placeholder="ĐV" style="flex:1"><input type="text" class="in-status" placeholder="Trạng thái" style="flex:1.5"></div>`;
            x2iList.appendChild(div);
        }

        function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) return alert("Nhập tên món!");

            let tableRows = "";
            document.querySelectorAll('.x2i-box').forEach((item, index) => {
                tableRows += `<tr><td class="stt">${index+1}</td><td contenteditable="false">${item.querySelector('.in-ing').value || "-"}</td><td contenteditable="false">${item.querySelector('.in-amt').value || "-"}</td><td contenteditable="false">${item.querySelector('.in-unit').value || "-"}</td><td contenteditable="false">${item.querySelector('.in-status').value || "-"}</td></tr>`;
            });

            const entryHtml = `<div class="recipe-entry">
                <button class="del-recipe-btn" onclick="if(confirm('Xóa món này?')) {this.parentElement.remove(); saveToLocal();}">XÓA MÓN</button>
                <strong contenteditable="false" style="color:var(--neon-blue); display:block; margin:10px 0;">🥘 MÓN: ${name.toUpperCase()}</strong>
                <table class="recipe-table"><thead><tr><th style="width:10%">#</th><th style="width:35%">Tên</th><th style="width:15%">SL</th><th style="width:15%">ĐV</th><th style="width:25%">T.Thái</th></tr></thead>
                <tbody>${tableRows}</tbody></table>
                <div class="editable-text" contenteditable="false" style="color:var(--neon-pink); font-size:12px;">📝 CHẾ BIẾN:\n${document.getElementById('cookingSteps').value}</div>
                <div class="editable-text" contenteditable="false" style="color:#aaa; font-size:12px; margin-bottom:10px;">💡 LƯU Ý:\n${document.getElementById('notes').value}</div><hr style="border:0; border-top:1px dashed #333; margin:15px 0;"></div>`;

            preview.insertAdjacentHTML('afterbegin', entryHtml);
            saveToLocal();
            resetForm();
            if(isUnlocked) applyLockStatus();
        }

        // Xử lý Click Chuột phải để Thêm/Xóa hàng
        preview.addEventListener('contextmenu', function(e) {
            if (!isUnlocked) return;
            const cell = e.target.closest('td');
            if (!cell) return;
            e.preventDefault();

            const row = cell.parentElement;
            const tbody = row.parentElement;
            const action = confirm("Bấm OK để THÊM hàng mới bên dưới\nBấm CANCEL để XÓA hàng này");

            if (action) {
                const newRow = row.cloneNode(true);
                newRow.querySelectorAll('td').forEach((td, idx) => { if(idx > 0) td.innerText = "-"; });
                row.after(newRow);
            } else {
                if (tbody.rows.length > 1) row.remove();
                else alert("Không thể xóa hàng cuối cùng!");
            }
            
            // Đánh lại số thứ tự
            Array.from(tbody.rows).forEach((r, i) => { r.cells[0].innerText = i + 1; });
            saveToLocal();
        });

        function saveToLocal() { localStorage.setItem('cook_html_v17', preview.innerHTML); }
        
        function resetForm() {
            document.getElementById('recipeName').value = ''; x2iList.innerHTML = ''; addX2i();
            document.getElementById('cookingSteps').value = "1. "; document.getElementById('notes').value = "1. ";
        }

        function exportTxt() {
            let txt = "SỔ TAY NẤU ĂN\n\n" + preview.innerText.replace(/XÓA MÓN/g, '');
            const blob = new Blob(["\ufeff", txt], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Recipes.txt`; a.click();
        }

        preview.addEventListener('input', saveToLocal);
    </script>
</body>
</html>
