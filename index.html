<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sổ Tay Nấu Ăn V12 - No Overflow</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-green: #00ff41;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 15px 10px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
        }

        h2 { text-align: center; color: var(--neon-blue); text-transform: uppercase; margin: 10px 0; font-size: 18px; }

        .section-title {
            font-size: 11px; color: var(--neon-pink); margin: 20px 0 10px 0;
            border-left: 3px solid var(--neon-pink); padding-left: 8px;
            text-transform: uppercase; font-weight: bold; display: block;
        }

        .x1-main-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-radius: 10px; padding: 12px;
        }

        .x2i-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333; border-radius: 8px;
            padding: 10px; margin-bottom: 12px; position: relative;
        }

        label { display: block; font-size: 10px; color: var(--neon-blue); margin-bottom: 4px; font-weight: bold; }

        input, textarea {
            background: #000; border: 1px solid #444; border-radius: 6px;
            color: #fff; padding: 10px; font-size: 15px; outline: none;
            width: 100%; box-sizing: border-box;
        }

        .btn-grid { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 8px; margin: 20px 0; }
        .main-btn { height: 45px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-create { background: var(--neon-blue); color: #000; }
        .btn-export { background: var(--neon-pink); color: #fff; }
        .btn-reset { background: #333; color: #fff; }

        /* --- FIX TRÀN BẢNG --- */
        #finalResult {
            margin-top: 15px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 8px;
            border-radius: 8px;
            background: #000;
        }

        .result-item { margin-bottom: 25px; border-bottom: 1px dashed #333; padding-bottom: 15px; }

        .recipe-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin: 10px 0;
            color: var(--neon-green);
            table-layout: fixed; /* Cố định chiều rộng bảng */
        }

        .recipe-table th, .recipe-table td {
            border: 1px solid #333;
            padding: 5px;
            text-align: left;
            word-wrap: break-word; /* Tự động xuống dòng */
            overflow-wrap: break-word;
            vertical-align: top;
        }

        /* Định nghĩa % cột để không bị lấn át nhau */
        .col-stt { width: 12%; }
        .col-ten { width: 35%; }
        .col-sl { width: 15%; }
        .col-dv { width: 13%; }
        .col-tt { width: 25%; }

        .recipe-table th { background: rgba(0, 242, 255, 0.1); color: var(--neon-blue); }
        .text-output { font-size: 13px; white-space: pre-wrap; margin-top: 8px; color: #eee; }
        .flex-group { display: flex; gap: 6px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>👨‍🍳 KITCHEN DIARY V12</h2>

        <div class="x1-main-box">
            <span class="section-title">X1: Tên món ăn</span>
            <input type="text" id="recipeName" placeholder="Tên món...">

            <div style="margin-top: 20px;">
                <span class="section-title">Thành phần</span>
                <div id="x2i-list"></div>
                <button onclick="addX2i()" style="background:transparent; color:var(--neon-green); border:1px dashed var(--neon-green); width:100%; padding:10px; border-radius:6px; cursor:pointer">+ THÊM NGUYÊN LIỆU</button>
            </div>
        </div>

        <div style="margin-top:20px">
            <span class="section-title">X2: Cách chế biến</span>
            <textarea id="cookingSteps" style="height:120px" placeholder="1. Bước 1..."></textarea>
        </div>

        <div style="margin-top:20px">
            <span class="section-title">X3: Lưu ý</span>
            <textarea id="notes" style="height:80px" placeholder="1. Lưu ý..."></textarea>
        </div>

        <div class="btn-grid">
            <button class="main-btn btn-create" onclick="saveRecipe()">Lưu Sổ</button>
            <button class="main-btn btn-export" onclick="exportTxt()">Xuất TXT</button>
            <button class="main-btn btn-reset" onclick="resetForm()">Reset</button>
        </div>

        <span class="section-title">Danh sách món đã lưu</span>
        <div id="finalResult"></div>
    </div>

    <script>
        const x2iList = document.getElementById('x2i-list');
        const finalResult = document.getElementById('finalResult');
        let allRecipes = JSON.parse(localStorage.getItem('my_recipes_v12_fixed')) || [];

        window.onload = () => {
            renderRecipes();
            if(x2iList.children.length === 0) addX2i();
            document.getElementById('cookingSteps').value = "1. ";
            document.getElementById('notes').value = "1. ";
        };

        function addX2i() {
            const div = document.createElement('div');
            div.className = 'x2i-box';
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" style="position:absolute; right:5px; top:5px; background:#ff4444; border:none; color:white; border-radius:50%; width:20px; height:20px; cursor:pointer">✕</button>
                <label>Tên thành phần</label>
                <input type="text" class="in-ing" placeholder="Tên...">
                <div class="flex-group">
                    <input type="text" class="in-amt" placeholder="SL" style="flex:1">
                    <input type="text" class="in-unit" placeholder="ĐV" style="flex:1">
                    <input type="text" class="in-status" placeholder="Trạng thái" style="flex:1.5">
                </div>
            `;
            x2iList.appendChild(div);
        }

        function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) return alert("Nhập tên món!");

            const ingredients = [];
            document.querySelectorAll('.x2i-box').forEach((item, index) => {
                const ing = item.querySelector('.in-ing').value;
                if(ing) {
                    ingredients.push({
                        stt: index + 1,
                        name: ing,
                        amt: item.querySelector('.in-amt').value,
                        unit: item.querySelector('.in-unit').value,
                        status: item.querySelector('.in-status').value
                    });
                }
            });

            const recipe = {
                id: Date.now(),
                name: name.toUpperCase(),
                ingredients: ingredients,
                steps: document.getElementById('cookingSteps').value,
                notes: document.getElementById('notes').value
            };

            allRecipes.unshift(recipe);
            localStorage.setItem('my_recipes_v12_fixed', JSON.stringify(allRecipes));
            renderRecipes();
            resetForm();
        }

        function renderRecipes() {
            finalResult.innerHTML = '';
            allRecipes.forEach(r => {
                let tableRows = r.ingredients.map(i => 
                    `<tr><td>${i.stt}</td><td>${i.name}</td><td>${i.amt}</td><td>${i.unit}</td><td>${i.status}</td></tr>`
                ).join('');

                const html = `
                    <div class="result-item">
                        <strong style="color:var(--neon-blue); display:block; margin-bottom:8px;">🥘 MÓN: ${r.name}</strong>
                        <table class="recipe-table">
                            <colgroup>
                                <col class="col-stt">
                                <col class="col-ten">
                                <col class="col-sl">
                                <col class="col-dv">
                                <col class="col-tt">
                            </colgroup>
                            <tr><th>#</th><th>Tên</th><th>SL</th><th>ĐV</th><th>Tr.Thái</th></tr>
                            ${tableRows}
                        </table>
                        <div class="text-output"><span style="color:var(--neon-pink); font-weight:bold;">📝 CHẾ BIẾN:</span>\n${r.steps}</div>
                        <div class="text-output"><span style="color:var(--neon-pink); font-weight:bold;">💡 LƯU Ý:</span>\n${r.notes}</div>
                    </div>
                `;
                finalResult.innerHTML += html;
            });
        }

        function resetForm() {
            document.getElementById('recipeName').value = '';
            x2iList.innerHTML = '';
            addX2i();
            document.getElementById('cookingSteps').value = "1. ";
            document.getElementById('notes').value = "1. ";
        }

        function exportTxt() {
            if (allRecipes.length === 0) return alert("Chưa có dữ liệu!");
            let txt = "SỔ TAY NẤU ĂN\n\n";
            allRecipes.forEach(r => {
                txt += `🥘 MÓN: ${r.name}\nTHÀNH PHẦN:\nSTT | Tên | SL | ĐV | Trạng thái\n`;
                r.ingredients.forEach(i => {
                    txt += `${i.stt} | ${i.name} | ${i.amt} | ${i.unit} | ${i.status}\n`;
                });
                txt += `\nCHẾ BIẾN:\n${r.steps}\nLƯU Ý:\n${r.notes}\n`;
                txt += `-----------------------------------\n\n`;
            });
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, txt], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Kitchen_Diary.txt`;
            a.click();
        }
    </script>
</body>
</html>
